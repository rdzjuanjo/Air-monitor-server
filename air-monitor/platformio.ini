; ============================================================================
; PlatformIO Configuration for MOVOCA Air Quality Monitoring System
; ============================================================================
; Proyecto: Sistema de Monitoreo de Calidad del Aire
; Versión: 1.0.4
; Hardware: ESP32 DevKit v1
; Sensor: MQ135 (COVs - Compuestos Orgánicos Volátiles)
; ============================================================================

[platformio]
; Directorio por defecto para el código fuente
src_dir = src
; Entorno por defecto
default_envs = esp32dev

; ============================================================================
; CONFIGURACIÓN PRINCIPAL - ESP32
; ============================================================================
[env:esp32dev]
; Plataforma y framework
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts =
    post:auto_upload.py
; ============================================================================
; Velocidad de comunicación serial (115200 baud)
monitor_speed = 115200

; Flags de compilación para optimizar y corregir advertencias
build_flags = 
    ; Optimización de tamaño (-Os) para reducir uso de flash
    -Os
    
    ; Tamaño de partición para permitir OTA (mínimo 1.9MB por partición)
    ;-D BOARD_HAS_PSRAM
    
    ; Nivel de debug (1=básico, 2=verbose)
    -D CORE_DEBUG_LEVEL=1
    
    ; Habilitar soporte de particiones OTA
    ;-D CONFIG_PARTITION_TABLE_CUSTOM_FILENAME="partitions.csv"

    ; Include paths para librerías genéricas reutilizables (header-only)
    -I lib
    ; Include paths para librerías de instrumentos
    -I lib/instruments/MQ
    -I lib/instruments/pH
    -I lib/instruments/conductivity
    -I lib/instruments/temperature
    ; Include paths para subcarpetas MVC de src/ (garantía explícita)
    -I src
    -I src/model
    -I src/model/sensors
    -I src/controller
    -I src/view
    -I src/infra
    ; Include path explicito de SPI (requerido por Adafruit BusIO en este entorno)
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/SPI/src

; ============================================================================
; ESQUEMA DE PARTICIONES PARA OTA
; ============================================================================
; Este esquema permite actualizaciones Over-The-Air
; Asegúrate de tener un archivo partitions.csv en la raíz del proyecto
board_build.partitions = partitions.csv
; Sistema de archivos nativo ESP32
board_build.filesystem = littlefs

; ============================================================================
; LIBRERÍAS NECESARIAS
; ============================================================================
lib_deps = 
    ; === FRAMEWORK (explícito por archivos planos en lib/) ===
    Preferences

    ; === COMUNICACIÓN WiFi Y WEB ===
    
    ; WebServer nativo del ESP32 (incluido en framework)
    ; WebSocketsServer para comunicación en tiempo real
    links2004/WebSockets@^2.4.1
    
    ; === MQTT ===
    ; Cliente MQTT para envío de datos a broker
    knolleary/PubSubClient@^2.8
    
    ; === JSON ===
    ; ArduinoJson para manejo de datos JSON (WebSocket, MQTT, configuración)
    bblanchon/ArduinoJson@^6.21.4
    
    ; === OTA (Over-The-Air Updates) ===
    ; Librería para actualizaciones remotas de firmware
    ; https://github.com/espressif/arduino-esp32/tree/master/libraries/Update
    https://github.com/mikalhart/ESP32-OTA-Pull.git
    
    ESP32Async/ESPAsyncWebServer @ 3.10.0
	ESP32Async/AsyncTCP @ 3.4.10

    ; === ADC EXTERNO (ADS1115) ===
    adafruit/Adafruit ADS1X15@^2.5.0

    ; === TEMPERATURA (DS18B20) ===
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

    ; === BUS SPI (requerido por Adafruit BusIO) ===
    SPI

upload_speed = 921600



