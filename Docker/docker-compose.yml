services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    networks:
      - backend

  influxdb:
    image: influxdb:2.9
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - backend

  telegraf:
    image: telegraf:1.35
    restart: unless-stopped
    environment:
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - backend

  telegraf-system:
    image: telegraf:1.35
    restart: unless-stopped
    environment:
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET_SYSTEM: ${INFLUX_BUCKET_SYSTEM}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      HOST_ETC: /hostfs/etc
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_VAR: /hostfs/var
      HOST_RUN: /hostfs/run
      HOST_MOUNT_PREFIX: /hostfs
    volumes:
      - ./telegraf/telegraf-system.conf:/etc/telegraf/telegraf.conf:ro
      - /:/hostfs:ro
    depends_on:
      - influxdb
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-sin-configurar}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-sin-configurar}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - influxdb
    networks:
      - backend

  dashboard:
    build:
      context: ../Map dashboard
    restart: unless-stopped
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_MEASUREMENT: env_monitoring
      INFLUX_STATION_TAG: device_id
      INFLUX_VALUE_FIELD: cvol
      INFLUX_LAT_FIELD: lat
      INFLUX_LON_FIELD: lon
      DASHBOARD_WINDOW_HOURS: "24"
      DASHBOARD_STEP_MINUTES: "20"
    depends_on:
      - influxdb
    networks:
      - backend

  admin-panel:
    build:
      context: ./admin-panel
    restart: unless-stopped
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC_BASE: monitoreo
      SECRET_KEY: ${ADMIN_SECRET_KEY}
      OTA_DIR: /app/ota
      OTA_BASE_URL: ${OTA_BASE_URL}
    volumes:
      - ./admin-panel/users.yaml:/app/users.yaml:ro
      - ota_files:/app/ota
      - admin_data:/app/data
    depends_on:
      - influxdb
      - mosquitto
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates/${NGINX_PROFILE}:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ota_files:/usr/share/nginx/ota:ro
    depends_on:
      - mosquitto
      - grafana
      - influxdb
      - admin-panel
      - dashboard
    networks:
      - backend

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

networks:
  backend:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
  certbot_conf:
  certbot_www:
  ota_files:
  admin_data:
