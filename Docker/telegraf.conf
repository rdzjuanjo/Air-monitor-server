[agent]
  interval = "10s"
  flush_interval = "10s"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

# Telemetria de los ESP32 - air-monitor
# Topic: riosvivos/monitoring/{device_id}
# Ver air-monitor/mqttcomands.md para el formato del payload "telemetry".
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["riosvivos/monitoring/+"]
  data_format = "json_v2"
  name_override = "env_monitoring"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "riosvivos/monitoring/+"
    tags  = "_/_/device_id"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metrics.CVOL"
      rename = "cvol"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metrics.mq135_adc"
      rename = "mq135_adc"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metadata.coord_x"
      rename = "lon"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metadata.coord_y"
      rename = "lat"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metadata.device.wifi.rssi"
      rename = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "metadata.device.instruments.mq135_adc0"
      rename = "mq135_adc0"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "metadata.device.fw"
      rename = "fw"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "metadata.device.instruments.mq135_cal"
      rename = "mq135_cal"
