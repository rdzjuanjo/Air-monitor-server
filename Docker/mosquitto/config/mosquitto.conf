# Mosquitto - broker para Air Monitor JJR
# Acceso anonimo (igual que mqtt.riosvivos.org actual).

persistence true
persistence_location /mosquitto/data/

log_dest stdout

# Listener para ESP32 / Telegraf (MQTT plano)
listener 1883
protocol mqtt
allow_anonymous true

# Listener websockets para mqtt.sensio.mx (clientes web tipo MQTT.js)
listener 9001
protocol websockets
allow_anonymous true
