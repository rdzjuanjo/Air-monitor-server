<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensio - Monitoreo de calidad del aire</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    .card {
      text-align: center;
      padding: 2.5rem 3rem;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    p.subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 0.9rem 1.8rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s ease;
    }
    .links a:hover {
      opacity: 0.85;
    }
    .links a.primary {
      background: #38bdf8;
      color: #0f172a;
    }
    .links a.secondary {
      background: transparent;
      color: #f1f5f9;
      border: 1px solid #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sensio</h1>
    <p class="subtitle">Monitoreo de calidad del aire</p>
    <div class="links">
      <a class="primary" id="mapa-link" href="#">Dashboard publico</a>
      <a class="secondary" id="admin-link" href="#">Administrador de dispositivos</a>
    </div>
  </div>
  <script>
    // Construye los enlaces a partir del dominio/protocolo actuales,
    // para que funcionen tanto en sensio.mx (vps) como en dash.local (lan).
    var baseDomain = window.location.hostname.replace(/^www\./, '');
    var protocol = window.location.protocol;
    document.getElementById('mapa-link').href = protocol + '//mapa.' + baseDomain;
    document.getElementById('admin-link').href = protocol + '//admin.' + baseDomain;
  </script>
</body>
</html>
