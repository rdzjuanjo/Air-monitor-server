apiVersion: 1

groups:
  - orgId: 1
    name: servidor
    folder: Servidor
    interval: 1m
    rules:
      - uid: servidor-disco-lleno
        title: "Disco del servidor casi lleno"
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "El disco / del servidor supera el 85% de uso"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "sistema")
                  |> range(start: -10m)
                  |> filter(fn: (r) => r._measurement == "disk")
                  |> filter(fn: (r) => r._field == "used_percent")
                  |> filter(fn: (r) => r.path == "/")
                  |> last()
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [85]

      - uid: servidor-ram-alta
        title: "Uso de RAM del servidor muy alto"
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "La RAM del servidor supera el 90% de uso"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "sistema")
                  |> range(start: -10m)
                  |> filter(fn: (r) => r._measurement == "mem")
                  |> filter(fn: (r) => r._field == "used_percent")
                  |> last()
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
