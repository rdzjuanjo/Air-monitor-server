# Dashboard publico (Streamlit) - mapa.sensio.mx

server {
    listen 80;
    listen [::]:80;
    server_name mapa.sensio.mx;

    include /etc/nginx/snippets/acme-redirect.conf;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mapa.sensio.mx;

    include /etc/nginx/snippets/ssl-sensio.conf;

    location / {
        proxy_pass http://dashboard:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit usa websockets para mantener la sesion
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
