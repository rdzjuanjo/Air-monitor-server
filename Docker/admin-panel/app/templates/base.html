<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sensio - Administrador{% endblock %}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHSrymmNJznFf1g/aWWl6ZSGcUm0="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 2rem;
    }
    a { color: #38bdf8; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #334155;
      padding: 0.5rem 0.75rem;
      text-align: left;
      vertical-align: top;
      font-size: 0.9rem;
    }
    th { background: #1e293b; }
    .flash {
      padding: 0.6rem 1rem;
      border-radius: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .flash.success { background: #14532d; }
    .flash.error { background: #7f1d1d; }
    form.inline { display: flex; gap: 0.3rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.3rem; }
    input[type="text"], input[type="number"], input[type="password"] {
      background: #1e293b;
      border: 1px solid #475569;
      color: #f1f5f9;
      border-radius: 0.3rem;
      padding: 0.3rem 0.5rem;
      width: 6.5rem;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 0.3rem;
      padding: 0.35rem 0.7rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .device-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .device-card.offline {
      opacity: 0.65;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 0.3rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-badge.online { background: #14532d; color: #86efac; }
    .status-badge.offline { background: #7f1d1d; color: #fecaca; }
    .card-status {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.25rem 1rem;
      font-size: 0.85rem;
    }
    .card-map {
      height: 250px;
      border: 1px solid #334155;
      border-radius: 0.4rem;
      overflow: hidden;
    }
    .card-chart {
      width: 100%;
      max-height: 180px;
    }
    button.danger { background: #ef4444; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
